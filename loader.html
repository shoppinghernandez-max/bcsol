<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BancoSol </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: sans-serif;
        }
        .loader-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            width: 100%;
            height: 100%;
        }
        .loader-logo {
            height: 70px;
            width: 140px;
        }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(70, 0, 155, 0.2);
            border-top-color: rgb(70, 0, 155);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-text {
            font-size: 16px;
            font-weight: 500;
            color: rgb(70, 0, 155);
            font-family: sans-serif;
            letter-spacing: 0.5px;
        }
        .loader-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="loader-overlay">
        <img src="./empresas_files/logo-blue.png" alt="BancoSol" class="loader-logo">
        <div class="loader-spinner"></div>
        <div class="loader-text">Cargando<span class="loader-dots"></span></div>
    </div>
</body>
</html>
